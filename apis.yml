aid: enterprise-products-partners
name: Enterprise Products Partners
description: >-
  Enterprise Products Partners L.P. is one of the largest publicly traded
  partnerships and a leading North American provider of midstream energy
  services, headquartered in Houston, Texas. The company operates more than
  50,000 miles of pipeline and over 300 million barrels of liquids storage,
  providing crude oil and natural gas transportation, NGL processing and
  fractionation, petrochemical and refined product logistics, storage, and
  marine transportation services. The company does not publish a public
  developer API portal but maintains internal and partner-facing integration
  capabilities for pipeline operations and energy logistics.
